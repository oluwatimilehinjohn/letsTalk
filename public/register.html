<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css"
      integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk="
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="/css/style.css"
    />

    <title>Create Account | letsTalk</title>
  </head>

  <body>
    <div class="join-container">
      <header class="join-header">
        <h1>
          <i class="fas fa-comments"></i>
          letsTalk
        </h1>
      </header>

      <main class="join-main">
        <h2>Create your account</h2>

        <p class="auth-description">
          Your username will identify you in chat rooms.
        </p>

        <div
          id="form-error"
          class="form-error"
          role="alert"
        ></div>

        <form id="register-form">
          <div class="form-control">
            <label for="username">
              Username
            </label>

            <input
              type="text"
              id="username"
              name="username"
              required
              minlength="3"
              maxlength="24"
              pattern="[A-Za-z0-9_]+"
              autocomplete="username"
              placeholder="Example: timi_dev"
            />
          </div>

          <div class="form-control">
            <label for="email">
              Email
            </label>

            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email"
              placeholder="you@example.com"
            />
          </div>

          <div class="form-control">
            <label for="password">
              Password
            </label>

            <input
              type="password"
              id="password"
              name="password"
              required
              minlength="8"
              maxlength="72"
              autocomplete="new-password"
              placeholder="At least 8 characters"
            />
          </div>

          <div class="form-control">
            <label for="confirm-password">
              Confirm password
            </label>

            <input
              type="password"
              id="confirm-password"
              name="confirmPassword"
              required
              minlength="8"
              maxlength="72"
              autocomplete="new-password"
              placeholder="Enter password again"
            />
          </div>

          <button
            type="submit"
            class="btn"
            id="submit-btn"
          >
            Create Account
          </button>
        </form>

        <p class="auth-link">
          Already registered?
          <a href="/">
            Log in
          </a>
        </p>
      </main>
    </div>

    <script src="/js/register.js"></script>
  </body>
</html>
