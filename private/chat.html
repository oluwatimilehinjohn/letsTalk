<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="/css/style.css" />

    <title>Chat | letsTalk</title>
  </head>

  <body>
    <div class="chat-container">
      <header class="chat-header">
        <div>
          <h1>
            <i class="fas fa-comment-dots"></i>
            letsTalk
          </h1>

          <small>
            Signed in as

            <a id="current-user" href="/profile"> ... </a>
          </small>
        </div>

        <div class="chat-header-actions">
          <button
            id="members-toggle"
            class="btn btn-secondary mobile-only"
            type="button"
            aria-controls="chat-sidebar"
            aria-expanded="false"
          >
            <i class="fas fa-users"></i>

            <span class="action-label"> Members </span>
          </button>

          <a href="/profile" class="btn btn-secondary">
            <i class="fas fa-user"></i>

            <span class="action-label"> Profile </span>
          </a>

          <button id="leave-btn" class="btn btn-secondary" type="button">
            <i class="fas fa-door-open"></i>

            <span class="action-label"> Leave Room </span>
          </button>

          <button id="logout-btn" class="btn btn-danger" type="button">
            <i class="fas fa-sign-out-alt"></i>

            <span class="action-label"> Log Out </span>
          </button>
        </div>
      </header>

      <button
        type="button"
        id="sidebar-backdrop"
        class="sidebar-backdrop"
        aria-label="Close member list"
      ></button>

      <main class="chat-main">
        <aside class="chat-sidebar" id="chat-sidebar">
          <h3>
            <i class="fas fa-comments"></i>
            Room
          </h3>

          <h2 id="room-name"></h2>

          <h3>
            <i class="fas fa-users"></i>
            Online Users
          </h3>

          <ul id="users"></ul>
        </aside>

        <div class="chat-messages"></div>
      </main>

      <div class="chat-form-container">
        <!-- Selected-message actions -->
        <div id="message-actions" class="message-actions" hidden>
          <div class="message-actions-summary">
            <i class="fas fa-comment-alt"></i>

            <span id="message-actions-preview"> Selected message </span>
          </div>

          <div class="message-actions-buttons">
            <button
              type="button"
              class="message-action-button"
              id="reply-action-btn"
            >
              <i class="fas fa-reply"></i>
              Reply
            </button>

            <button
              type="button"
              class="quick-reaction"
              data-emoji="👍"
              aria-label="React with thumbs up"
            >
              👍
            </button>

            <button
              type="button"
              class="quick-reaction"
              data-emoji="❤️"
              aria-label="React with heart"
            >
              ❤️
            </button>

            <button
              type="button"
              class="quick-reaction"
              data-emoji="😂"
              aria-label="React with laughing face"
            >
              😂
            </button>

            <button
              type="button"
              class="quick-reaction"
              data-emoji="😮"
              aria-label="React with surprised face"
            >
              😮
            </button>

            <button
              type="button"
              class="quick-reaction"
              data-emoji="😢"
              aria-label="React with sad face"
            >
              😢
            </button>

            <button
              type="button"
              class="message-actions-close"
              id="close-actions-btn"
              aria-label="Close message actions"
            >
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>

        <!-- Current reply -->
        <div id="reply-preview" class="reply-preview" hidden>
          <div class="reply-preview-icon">
            <i class="fas fa-reply"></i>
          </div>

          <div class="reply-preview-content">
            <strong id="reply-author"> Replying to </strong>

            <span id="reply-text"></span>
          </div>

          <button
            type="button"
            id="cancel-reply-btn"
            class="reply-preview-close"
            aria-label="Cancel reply"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>

        <form id="chat-form">
          <input
            id="msg"
            name="msg"
            type="text"
            placeholder="Enter message"
            maxlength="1000"
            required
            autocomplete="off"
          />

          <button class="btn" id="send-btn" type="submit">
            <i class="fas fa-paper-plane"></i>
            Send
          </button>
        </form>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script type="module" src="/js/chat/index.js"></script>
  </body>
</html>
