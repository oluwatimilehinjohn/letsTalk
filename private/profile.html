<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="/css/style.css"
    />

    <title>My Profile | letsTalk</title>
  </head>

  <body>
    <main class="profile-page">
      <header class="profile-navigation">
        <a
          href="/rooms"
          class="brand-link"
        >
          <i class="fas fa-comment-dots"></i>
          letsTalk
        </a>

        <div class="profile-navigation-actions">
          <a
            href="/rooms"
            class="btn btn-secondary"
          >
            <i class="fas fa-arrow-left"></i>
            Rooms
          </a>

          <button
            type="button"
            class="btn btn-danger"
            id="logout-btn"
          >
            Log Out
          </button>
        </div>
      </header>

      <section class="profile-hero">
        <div class="profile-avatar-shell">
          <img
            id="avatar-image"
            alt="Profile avatar"
            hidden
          />

          <div
            id="avatar-fallback"
            class="avatar-fallback"
          >
            LT
          </div>
        </div>

        <div>
          <p class="profile-eyebrow">
            Your profile
          </p>

          <h1 id="profile-heading">
            Loading...
          </h1>

          <p id="profile-username">
            @username
          </p>
        </div>
      </section>

      <div class="profile-layout">
        <section class="profile-card">
          <div class="profile-card-heading">
            <div>
              <h2>Profile image</h2>

              <p>
                JPEG, PNG or WebP. Maximum 4 MB.
              </p>
            </div>
          </div>

          <form id="avatar-form">
            <label
              class="file-picker"
              for="avatar-input"
            >
              <i class="fas fa-image"></i>

              <span id="file-picker-text">
                Choose an image
              </span>
            </label>

            <input
              type="file"
              id="avatar-input"
              name="avatar"
              accept="image/jpeg,image/png,image/webp"
              hidden
            />

            <div class="profile-form-actions">
              <button
                type="submit"
                class="btn"
                id="avatar-submit"
              >
                Upload avatar
              </button>

              <button
                type="button"
                class="btn btn-danger"
                id="remove-avatar-btn"
              >
                Remove
              </button>
            </div>

            <p
              id="avatar-status"
              class="profile-status"
            ></p>
          </form>
        </section>

        <section class="profile-card">
          <div class="profile-card-heading">
            <div>
              <h2>Personal information</h2>

              <p>
                Update how your profile appears.
              </p>
            </div>
          </div>

          <form id="profile-form">
            <div class="form-control">
              <label for="display-name">
                Display name
              </label>

              <input
                type="text"
                id="display-name"
                name="displayName"
                minlength="2"
                maxlength="40"
                required
              />
            </div>

            <div class="form-control">
              <label for="bio">
                Bio
              </label>

              <textarea
                id="bio"
                name="bio"
                maxlength="160"
                rows="5"
                placeholder="Tell people a little about yourself"
              ></textarea>

              <small id="bio-counter">
                0/160
              </small>
            </div>

            <button
              type="submit"
              class="btn"
              id="profile-submit"
            >
              Save profile
            </button>

            <p
              id="profile-status"
              class="profile-status"
            ></p>
          </form>
        </section>

        <section class="profile-card profile-card-wide">
          <div class="profile-card-heading">
            <div>
              <h2>Change password</h2>

              <p>
                Use at least eight characters.
              </p>
            </div>
          </div>

          <form id="password-form">
            <div class="password-grid">
              <div class="form-control">
                <label for="current-password">
                  Current password
                </label>

                <input
                  type="password"
                  id="current-password"
                  name="currentPassword"
                  autocomplete="current-password"
                  required
                />
              </div>

              <div class="form-control">
                <label for="new-password">
                  New password
                </label>

                <input
                  type="password"
                  id="new-password"
                  name="newPassword"
                  autocomplete="new-password"
                  minlength="8"
                  maxlength="72"
                  required
                />
              </div>
            </div>

            <button
              type="submit"
              class="btn"
              id="password-submit"
            >
              Change password
            </button>

            <p
              id="password-status"
              class="profile-status"
            ></p>
          </form>
        </section>
      </div>
    </main>

    <script src="/js/profile.js"></script>
  </body>
</html>
